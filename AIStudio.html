<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Astrivane · AI Studio Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@300;400;700&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet"/>
<style>
  :root {
    --void: #05060d;
    --deep: #0a0d1a;
    --nebula: #0e1228;
    --pulse: #7b8cde;
    --glow: #a8b8ff;
    --star: #e8ecff;
    --muted: #3a4060;
    --accent: #4fffcb;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--void);
    color: var(--star);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* star field */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 12% 18%, rgba(168,184,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 34% 72%, rgba(168,184,255,0.4) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 55% 9%, rgba(79,255,203,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 78% 44%, rgba(168,184,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 91% 83%, rgba(168,184,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 22% 56%, rgba(168,184,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 66% 31%, rgba(79,255,203,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 47% 88%, rgba(168,184,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 5% 95%, rgba(168,184,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 12%, rgba(168,184,255,0.4) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* nebula glow bg */
  body::after {
    content: '';
    position: fixed;
    width: 600px; height: 600px;
    top: -100px; right: -100px;
    background: radial-gradient(ellipse, rgba(123,140,222,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 780px;
    margin: 0 auto;
    padding: 60px 32px 100px;
  }

  header {
    margin-bottom: 64px;
    text-align: center;
  }

  .brand-mark {
    font-size: 10px;
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: var(--accent);
    opacity: 0.7;
    margin-bottom: 16px;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-style: italic;
    font-size: clamp(2rem, 5vw, 3.4rem);
    color: var(--star);
    letter-spacing: 0.02em;
    line-height: 1.1;
  }

  h1 span {
    color: var(--glow);
  }

  .sub {
    margin-top: 14px;
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* input area */
  .input-zone {
    margin-bottom: 48px;
  }

  .input-label {
    font-size: 9px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
    display: block;
  }

  textarea {
    width: 100%;
    background: rgba(14,18,40,0.8);
    border: 1px solid rgba(123,140,222,0.2);
    border-radius: 2px;
    color: var(--star);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 300;
    padding: 20px 24px;
    resize: none;
    outline: none;
    transition: border-color 0.4s;
    min-height: 110px;
    line-height: 1.7;
  }

  textarea::placeholder { color: var(--muted); }
  textarea:focus { border-color: rgba(123,140,222,0.5); }

  .generate-btn {
    margin-top: 16px;
    width: 100%;
    padding: 16px;
    background: transparent;
    border: 1px solid rgba(123,140,222,0.35);
    color: var(--glow);
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.4s;
    position: relative;
    overflow: hidden;
  }

  .generate-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(123,140,222,0.08) 0%, rgba(79,255,203,0.04) 100%);
    opacity: 0;
    transition: opacity 0.4s;
  }

  .generate-btn:hover::before { opacity: 1; }
  .generate-btn:hover { border-color: rgba(168,184,255,0.6); color: var(--star); }
  .generate-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* output grid */
  .output-grid {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .card {
    background: rgba(10,13,26,0.7);
    border: 1px solid rgba(123,140,222,0.12);
    padding: 28px 32px;
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 0.6s, transform 0.6s;
  }

  .card.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .card-label {
    font-size: 8px;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: var(--accent);
    opacity: 0.6;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .card-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(79,255,203,0.1);
  }

  .card-content {
    font-size: 14px;
    line-height: 1.8;
    color: rgba(232,236,255,0.85);
    font-weight: 300;
    white-space: pre-wrap;
  }

  .card.poetic .card-content {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 18px;
    color: var(--glow);
    letter-spacing: 0.01em;
  }

  .card.tags .card-content {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .copy-btn {
    margin-top: 14px;
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 8px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    cursor: pointer;
    padding: 6px 0;
    transition: color 0.3s;
  }
  .copy-btn:hover { color: var(--accent); }

  .loading-indicator {
    text-align: center;
    padding: 48px 0;
    display: none;
  }

  .pulse-ring {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1px solid rgba(123,140,222,0.4);
    margin: 0 auto 20px;
    animation: pulseRing 2s ease-in-out infinite;
  }

  @keyframes pulseRing {
    0%, 100% { transform: scale(1); opacity: 0.4; }
    50% { transform: scale(1.3); opacity: 0.8; }
  }

  .loading-text {
    font-size: 9px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .error-msg {
    padding: 20px 24px;
    border: 1px solid rgba(255,100,100,0.2);
    color: rgba(255,160,160,0.8);
    font-size: 12px;
    line-height: 1.6;
    display: none;
  }

  footer {
    margin-top: 80px;
    text-align: center;
    font-size: 9px;
    letter-spacing: 0.3em;
    color: rgba(58,64,96,0.6);
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="brand-mark">Astrivane</div>
    <h1>AI Studio <span>Assistant</span></h1>
    <p class="sub">Futuristic ambient · Release toolkit</p>
  </header>

  <div class="input-zone">
    <label class="input-label" for="trackIdea">Describe your track</label>
    <textarea id="trackIdea" placeholder="e.g. — A slowly expanding drone that begins in silence, moves through a field of crystalline pads, and dissolves into static white noise and distant radio signals at 3am…"></textarea>
    <button class="generate-btn" id="genBtn" onclick="generate()">
      ◌ &nbsp; Transmit to studio
    </button>
  </div>

  <div class="loading-indicator" id="loading">
    <div class="pulse-ring"></div>
    <div class="loading-text">Channelling signal...</div>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="output-grid" id="outputGrid"></div>

  <footer>Astrivane · Studio Intelligence · For the hours between</footer>
</div>

<script>
async function generate() {
  const idea = document.getElementById('trackIdea').value.trim();
  if (!idea) return;

  const btn = document.getElementById('genBtn');
  const loading = document.getElementById('loading');
  const errorMsg = document.getElementById('errorMsg');
  const grid = document.getElementById('outputGrid');

  btn.disabled = true;
  loading.style.display = 'block';
  errorMsg.style.display = 'none';
  grid.innerHTML = '';

  const systemPrompt = `You are Astrivane's AI Studio Assistant.

Brand: Futuristic ambient music. Label aesthetic is cosmic, minimal, intelligent.
Audience: Deep thinkers, night workers, dreamers, insomniacs, meditators.
Tone: Poetic, sparse, cosmic, never hype-y or commercial.

Given a track idea, respond ONLY with a JSON object with exactly these keys:
{
  "x_post": "...",
  "instagram_caption": "...",
  "minimax_tags": "...",
  "cover_art_prompt": "...",
  "poetic_description": "..."
}

Rules for each field:
- x_post: 1–3 short lines max. No hashtags except max 1 minimal one. No hype words. Cosmic, understated. Can include a release hook.
- instagram_caption: 3–5 lines. Fragmented, evocative, lowercase preferred. 3–5 relevant hashtags at end.
- minimax_tags: comma-separated list of 8–12 valid MiniMax-style music tags (genre, mood, texture, tempo descriptors).
- cover_art_prompt: One detailed square 1:1 image generation prompt. No people. Abstract, cosmic, dark. Painterly or photographic direction. Include lighting, palette, mood.
- poetic_description: Exactly one sentence. Lyrical. Under 20 words. Evocative of the feeling, not describing the sound literally.

No markdown, no extra keys, no explanation. Pure JSON only.`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: 'user', content: idea }]
      })
    });

    const data = await response.json();
    const raw = data.content?.map(b => b.text || '').join('');
    const clean = raw.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    loading.style.display = 'none';

    const cards = [
      { key: 'x_post',              label: 'X · Launch Post',          cls: '' },
      { key: 'instagram_caption',   label: 'Instagram Caption',         cls: '' },
      { key: 'minimax_tags',        label: 'MiniMax Tags',              cls: 'tags' },
      { key: 'cover_art_prompt',    label: 'Cover Art Prompt · 1:1',    cls: '' },
      { key: 'poetic_description',  label: 'Poetic Description',        cls: 'poetic' },
    ];

    cards.forEach((c, i) => {
      const card = document.createElement('div');
      card.className = `card ${c.cls}`;
      card.innerHTML = `
        <div class="card-label">${c.label}</div>
        <div class="card-content" id="content-${c.key}">${escapeHTML(parsed[c.key] || '')}</div>
        <button class="copy-btn" onclick="copyField('${c.key}')">⊕ Copy</button>
      `;
      grid.appendChild(card);
      setTimeout(() => card.classList.add('visible'), i * 100);
    });

  } catch (err) {
    loading.style.display = 'none';
    errorMsg.style.display = 'block';
    errorMsg.textContent = 'Signal lost. Check connection and try again.';
    console.error(err);
  }

  btn.disabled = false;
}

function escapeHTML(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function copyField(key) {
  const el = document.getElementById(`content-${key}`);
  if (el) {
    navigator.clipboard.writeText(el.textContent).then(() => {
      const btns = document.querySelectorAll('.copy-btn');
      btns.forEach(b => { if (b.onclick?.toString().includes(key)) b.textContent = '✓ Copied'; });
      setTimeout(() => {
        btns.forEach(b => { if (b.onclick?.toString().includes(key)) b.textContent = '⊕ Copy'; });
      }, 2000);
    });
  }
}

// allow Ctrl/Cmd+Enter to submit
document.getElementById('trackIdea').addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') generate();
});
</script>
</body>
</html>
